services:
  postgres:
    image: postgres:16-alpine
    container_name: spotter-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spotter_ai}
      POSTGRES_USER: ${POSTGRES_USER:-spotter}
      # Set in your private .env at repo root or export before `docker compose up` (see backend/.env.example).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — not hardcoded in the repo}
    ports:
      - "5432:5432"
    volumes:
      - spotter_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotter -d spotter_ai"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  spotter_ai_postgres_data:
