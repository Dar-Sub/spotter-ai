services:
  postgres:
    image: postgres:16-alpine
    container_name: spotter-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spotter_ai
      POSTGRES_USER: spotter
      POSTGRES_PASSWORD: spotter
    ports:
      - "5432:5432"
    volumes:
      - spotter_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotter -d spotter_ai"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  spotter_ai_postgres_data:
